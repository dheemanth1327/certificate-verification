<!DOCTYPE html>
<html>

<head>

<title>Certificate Verification</title>

<style>

body{
font-family:Arial;
background-image:url("background.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

/* Verification card */

.card{
background:rgba(255,255,255,0.92);
padding:40px;
width:420px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
backdrop-filter:blur(6px);
}

/* Badge animation */

.badge{
display:inline-block;
background:#2ecc71;
color:white;
padding:10px 20px;
border-radius:30px;
font-weight:bold;
margin-top:10px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{

0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}

}

.valid{
color:#27ae60;
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.invalid{
color:#e74c3c;
font-size:22px;
font-weight:bold;
}

/* Certificate details */

.details{
margin-top:20px;
text-align:left;
font-size:16px;
}

.details p{
margin:6px 0;
}

/* Download button */

button{
margin-top:20px;
padding:10px 20px;
border:none;
background:#3498db;
color:white;
border-radius:6px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#2980b9;
}

</style>

</head>

<body>

<div class="card">

<h2>Certificate Verification</h2>

<p>Authenticity Check Portal</p>

<div id="result">Verifying certificate...</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function verify(){

if(!id){

document.getElementById("result").innerHTML=
"<p class='invalid'>Invalid Verification Link</p>";

return;

}

let response = await fetch("https://sheetdb.io/api/v1/bzzljxyxibrmb/search?ID="+id);

let data = await response.json();

if(data.length>0){

document.getElementById("result").innerHTML=`

<div class="badge">Verified Certificate</div>

<p class="valid">Authentic Certificate ✅</p>

<div class="details">

<p><b>Name:</b> ${data[0].Name}</p>

<p><b>Event:</b> ${data[0].Event}</p>

<p><b>Date:</b> ${data[0].Date}</p>

<p><b>Organizer:</b> ${data[0].Organizer}</p>

<p><b>Certificate ID:</b> ${data[0].ID}</p>

</div>

<a href="${data[0].CertificateLink}" download>

<button>Download Certificate</button>

</a>

`;

}

else{

document.getElementById("result").innerHTML=
"<p class='invalid'>Invalid Certificate ❌</p>";

}

}

verify();

</script>

</body>

</html>
