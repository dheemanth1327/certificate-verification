<!DOCTYPE html>
<html>

<head>

<title>Certificate Verification</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.card{
background:white;
padding:40px;
width:450px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.badge{
margin:20px auto;
width:80px;
height:80px;
background:#2ecc71;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:40px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.15)}
100%{transform:scale(1)}
}

.valid{
color:#2ecc71;
font-size:22px;
font-weight:bold;
}

.invalid{
color:#e74c3c;
font-size:22px;
font-weight:bold;
}

.details{
margin-top:15px;
text-align:left;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
background:#3498db;
color:white;
border-radius:5px;
cursor:pointer;
}

iframe{
margin-top:20px;
width:100%;
height:400px;
border:none;
border-radius:10px;
}

</style>

</head>

<body>

<div class="card">

<h2>Certificate Verification</h2>

<div id="result">Verifying certificate...</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function verify(){

if(!id){

document.getElementById("result").innerHTML=
"<p class='invalid'>Invalid Verification Link</p>";

return;

}

let response = await fetch("https://sheetdb.io/api/v1/bzzljxyxibrmb/search?ID="+id);

let data = await response.json();

if(data.length>0){

document.getElementById("result").innerHTML=`

<div class="badge">✔</div>

<p class="valid">Certificate Verified</p>

<div class="details">

<p><b>Name:</b> ${data[0].Name}</p>
<p><b>Event:</b> ${data[0].Event}</p>
<p><b>Date:</b> ${data[0].Date}</p>
<p><b>Organizer:</b> ${data[0].Organizer}</p>
<p><b>Certificate ID:</b> ${data[0].ID}</p>

</div>

<button onclick="togglePreview()">Preview Certificate</button>

<a href="${data[0].CertificateLink}" target="_blank">
<button>Download Certificate</button>
</a>

<div id="preview"></div>

`;

window.certificateLink = data[0].CertificateLink;

}

else{

document.getElementById("result").innerHTML=
"<p class='invalid'>Invalid Certificate ❌</p>";

}

}

function togglePreview(){

document.getElementById("preview").innerHTML=
`<iframe src="${window.certificateLink}"></iframe>`;

}

verify();

</script>

</body>

</html>
