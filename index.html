<!DOCTYPE html>
<html>

<head>

<title>Certificate Verification</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.card{
background:white;
padding:40px;
width:420px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.badge{
display:inline-block;
background:#2ecc71;
color:white;
padding:10px 20px;
border-radius:30px;
font-weight:bold;
margin-top:10px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{

0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}

}

.valid{
color:#2ecc71;
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.invalid{
color:#e74c3c;
font-size:22px;
font-weight:bold;
}

.details{
margin-top:20px;
text-align:left;
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
background:#3498db;
color:white;
border-radius:5px;
cursor:pointer;
font-size:15px;
}

</style>

</head>

<body>

<div class="card">

<h2>Certificate Verification</h2>

<div id="result">Checking certificate...</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function verify(){

if(!id){

document.getElementById("result").innerHTML=
"<p class='invalid'>Invalid Verification Link</p>";

return;

}

let response = await fetch("https://sheetdb.io/api/v1/bzzljxyxibrmb/search?ID="+id);

let data = await response.json();

if(data.length>0){

document.getElementById("result").innerHTML=`

<div class="badge">Verified Certificate</div>

<p class="valid">Authentic Certificate ✅</p>

<div class="details">

<p><b>Name:</b> ${data[0].Name}</p>

<p><b>Event:</b> ${data[0].Event}</p>

<p><b>Date:</b> ${data[0].Date}</p>

<p><b>Organizer:</b> ${data[0].Organizer}</p>

<p><b>Certificate ID:</b> ${data[0].ID}</p>

</div>

<a href="${data[0].CertificateLink}" download>

<button>Download Certificate</button>

</a>

`;

}

else{

document.getElementById("result").innerHTML=
"<p class='invalid'>Invalid Certificate ❌</p>";

}

}

verify();

</script>

</body>

</html>
