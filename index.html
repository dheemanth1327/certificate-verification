<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificate Verification</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* BACKGROUND */

body{

font-family:Arial, Helvetica, sans-serif;

background:url("background.jpg") no-repeat center center fixed;
background-size:cover;

min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

padding:20px;

}

/* MOBILE BACKGROUND FIX */

@media (max-width:768px){

body{

background:url("background.jpg") no-repeat center center;
background-size:cover;
background-attachment:scroll;

}

}

/* GLASS CARD */

.card{

background:rgba(255,255,255,0.92);

padding:35px;

width:100%;
max-width:420px;

border-radius:16px;

text-align:center;

box-shadow:0 15px 35px rgba(0,0,0,0.3);

backdrop-filter:blur(6px);

}

/* TITLE */

h2{
font-size:26px;
margin-bottom:5px;
}

.subtitle{
color:#555;
margin-bottom:15px;
}

/* BADGE */

.badge{

display:inline-block;

background:#2ecc71;
color:white;

padding:10px 22px;

border-radius:30px;

font-weight:bold;

margin-top:10px;

animation:pulse 1.5s infinite;

}

@keyframes pulse{

0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}

}

/* STATUS */

.valid{

color:#27ae60;
font-size:22px;
font-weight:bold;

margin-top:10px;

}

.invalid{

color:#e74c3c;
font-size:22px;
font-weight:bold;

}

/* DETAILS */

.details{

margin-top:20px;

text-align:left;

font-size:16px;

}

.details p{

margin:6px 0;

}

/* DOWNLOAD BUTTON */

button{

margin-top:20px;

padding:12px 20px;

border:none;

background:#3498db;

color:white;

border-radius:8px;

cursor:pointer;

font-size:15px;

width:100%;

}

button:hover{

background:#2980b9;

}

/* MOBILE TEXT SIZE */

@media (max-width:480px){

.card{
padding:25px;
}

h2{
font-size:22px;
}

.details{
font-size:15px;
}

}

</style>

</head>

<body>

<div class="card">

<h2>Certificate Verification</h2>
<p class="subtitle">Authenticity Check Portal</p>

<div id="result">Verifying certificate...</div>

</div>

<script>

/* GET ID FROM QR LINK */

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

/* VERIFY FUNCTION */

async function verify(){

if(!id){

document.getElementById("result").innerHTML=
"<p class='invalid'>Invalid Verification Link</p>";

return;

}

try{

let response = await fetch("https://sheetdb.io/api/v1/bzzljxyxibrmb/search?ID="+id);

let data = await response.json();

if(data.length>0){

document.getElementById("result").innerHTML=`

<div class="badge">Verified Certificate</div>

<p class="valid">Authentic Certificate ✅</p>

<div class="details">

<p><b>Name:</b> ${data[0].Name}</p>

<p><b>Event:</b> ${data[0].Event}</p>

<p><b>Date:</b> ${data[0].Date}</p>

<p><b>Organizer:</b> ${data[0].Organizer}</p>

<p><b>Certificate ID:</b> ${data[0].ID}</p>

</div>

<a href="${data[0].CertificateLink}" download>

<button>Download Certificate</button>

</a>

`;

}

else{

document.getElementById("result").innerHTML=
"<p class='invalid'>Invalid Certificate ❌</p>";

}

}

catch(error){

document.getElementById("result").innerHTML=
"<p class='invalid'>Error verifying certificate</p>";

}

}

/* RUN VERIFICATION */

verify();

</script>

</body>
</html>
